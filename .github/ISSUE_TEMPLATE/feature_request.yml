name: Feature Request
description: Propose a new feature or API improvement for Sculk Studio
labels: [enhancement]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea that would make Sculk Studio better? We'd love to hear it.

  - type: textarea
    id: problem
    attributes:
      label: Problem Statement
      description: What problem does this feature solve? What are you currently unable to do?
    validations:
      required: true

  - type: textarea
    id: solution
    attributes:
      label: Proposed Solution
      description: Describe the API or behaviour you'd like to see.
    validations:
      required: true

  - type: textarea
    id: api-design
    attributes:
      label: Desired API (optional)
      description: If you have a DSL or code snippet in mind, share it here.
      render: kotlin

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives Considered
      description: What workarounds or alternative approaches have you tried?

  - type: dropdown
    id: module
    attributes:
      label: Affected Module
      options:
        - sculk-core
        - sculk-config
        - sculk-series
        - sculk-effects
        - sculk-data
        - sculk-platform
        - multiple modules
        - unsure
    validations:
      required: true
