name: DaisyTracker

on:
  push:
    branches:
      - main
      - master

jobs:
  notify:
    runs-on: ubuntu-latest
    permissions:
      contents: read
    steps:
      - name: Push via DaisyTracker
        uses: DaisyCatTs/DaisyTracker@master
        with:
          discord-webhook-url: ${{ secrets.DISCORD_WEBHOOK_URL }}
